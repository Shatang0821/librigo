<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librigo - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-spinner {
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top: 3px solid #4f46e5;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <!-- ナビゲーション -->
    <nav class="bg-indigo-600 text-white shadow-lg">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter">LIBRIGO</h1>
            <div class="space-x-4">
                <button onclick="showSection('browse')" class="hover:text-indigo-200 font-bold transition">閲覧・検索</button>
                <button onclick="showSection('register')" class="bg-white text-indigo-600 px-4 py-2 rounded-lg font-bold hover:bg-indigo-50 transition shadow-md">新規追加</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-10">
        
        <!-- 閲覧・検索セクション -->
        <section id="section-browse" class="fade-in">
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
                <h2 class="text-2xl font-bold">蔵書一覧</h2>
                
                <!-- 検索バー -->
                <div class="flex gap-2">
                    <input type="text" id="searchId" placeholder="書籍IDで検索..." 
                        class="px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none w-full md:w-64">
                    <button onclick="searchBook()" class="bg-slate-800 text-white px-6 py-2 rounded-xl font-bold hover:bg-slate-900 transition">検索</button>
                    <button onclick="loadBooks()" class="text-indigo-600 px-2 py-2 hover:bg-indigo-50 rounded-xl transition" title="リセット">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 書籍リスト表示エリア -->
            <div id="bookGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- JavaScriptでここにカードが追加されます -->
            </div>
            
            <div id="noResult" class="hidden text-center py-20 bg-white rounded-3xl border border-dashed border-slate-300">
                <p class="text-slate-400">該当する書籍が見つかりませんでした。</p>
            </div>
        </section>

        <!-- 登録セクション (初期は非表示) -->
        <section id="section-register" class="hidden fade-in max-w-lg mx-auto">
            <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
                <div class="bg-slate-800 p-6 text-white text-center">
                    <h2 class="text-xl font-bold">新規書籍登録</h2>
                </div>
                <form id="bookForm" class="p-8 space-y-5">
                    <div class="space-y-1">
                        <label class="text-sm font-bold text-slate-600">タイトル</label>
                        <input type="text" id="reg-title" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-400">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-sm font-bold text-slate-600">価格 (円)</label>
                            <input type="number" id="reg-price" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-400">
                        </div>
                        <div class="space-y-1">
                            <label class="text-sm font-bold text-slate-600">ISBN</label>
                            <input type="text" id="reg-isbn" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-400">
                        </div>
                    </div>
                    <button type="submit" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-100">
                        登録を実行する
                    </button>
                    <button type="button" onclick="showSection('browse')" class="w-full py-2 text-slate-400 text-sm hover:text-slate-600 transition">
                        キャンセル
                    </button>
                </form>
            </div>
        </section>

    </main>

    <!-- 通知 -->
    <div id="toast" class="fixed bottom-10 right-10 transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none">
        <div id="toastContent" class="bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3">
            <!-- メッセージ -->
        </div>
    </div>

    <script>
        const bookGrid = document.getElementById('bookGrid');
        const noResult = document.getElementById('noResult');
        const toast = document.getElementById('toast');
        const toastContent = document.getElementById('toastContent');

        // 初期読み込み
        window.onload = loadBooks;

        // セクション切り替え
        function showSection(section) {
            document.getElementById('section-browse').classList.toggle('hidden', section !== 'browse');
            document.getElementById('section-register').classList.toggle('hidden', section !== 'register');
            if (section === 'browse') loadBooks();
        }

        // 書籍カードの生成
        function createBookCard(book) {
            return `
                <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow group">
                    <div class="flex justify-end mb-4">
                        <span class="text-slate-400 text-xs font-medium tracking-tight">ISBN: ${book.isbn}</span>
                    </div>
                    <h3 class="text-lg font-bold text-slate-800 mb-2 group-hover:text-indigo-600 transition-colors leading-tight">${book.title}</h3>
                    <div class="flex items-center justify-between mt-4 pt-4 border-t border-slate-50">
                        <span class="text-sm font-bold text-slate-500">販売価格</span>
                        <span class="text-xl font-black text-slate-900">¥${book.price.toLocaleString()}</span>
                    </div>
                </div>
            `;
        }

        // 一覧取得 (GET /books)
        async function loadBooks() {
            bookGrid.innerHTML = '<div class="col-span-full flex justify-center py-10"><div class="loading-spinner"></div></div>';
            noResult.classList.add('hidden');
            document.getElementById('searchId').value = '';

            try {
                const response = await fetch('/books');
                if (!response.ok) throw new Error();
                const books = await response.json();

                if (!books || books.length === 0) {
                    bookGrid.innerHTML = '';
                    noResult.classList.remove('hidden');
                } else {
                    bookGrid.innerHTML = books.map(book => createBookCard(book)).join('');
                }
            } catch (err) {
                showToast('❌ 書籍データの読み込みに失敗しました');
                bookGrid.innerHTML = '';
            }
        }

        // ID検索 (GET /books/{id})
        async function searchBook() {
            const id = document.getElementById('searchId').value.trim();
            if (!id) return loadBooks();

            bookGrid.innerHTML = '<div class="col-span-full flex justify-center py-10"><div class="loading-spinner"></div></div>';
            
            try {
                const response = await fetch(`/books/${id}`);
                if (!response.ok) {
                    if (response.status === 404) throw new Error('見つかりませんでした');
                    throw new Error('検索エラー');
                }
                const book = await response.json();
                
                bookGrid.innerHTML = createBookCard(book);
                noResult.classList.add('hidden');
            } catch (err) {
                showToast(`❌ ${err.message}`);
                bookGrid.innerHTML = '';
                noResult.classList.remove('hidden');
            }
        }

        // 登録処理 (POST /books)
        document.getElementById('bookForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                title: document.getElementById('reg-title').value,
                price: parseInt(document.getElementById('reg-price').value),
                isbn: document.getElementById('reg-isbn').value
            };

            try {
                const response = await fetch('/books', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error();

                showToast('✅ 書籍を登録しました');
                document.getElementById('bookForm').reset();
                setTimeout(() => showSection('browse'), 1000);
            } catch (err) {
                showToast('❌ 登録に失敗しました');
            }
        });

        // 通知ユーティリティ
        function showToast(message) {
            toastContent.innerHTML = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }
    </script>
</body>
</html>
