services:
  frontend:
    build: ./frontend
    container_name: librigo-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:8080
    tty: true

  backend:
    build: ./backend  
    container_name: librigo-backend
    volumes:
      - ./backend:/app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=librigo

  db:
    image: postgres:17-alpine
    container_name: librigo-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: librigo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d librigo"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    volumes:
      - ./backend/migrations:/migrations
    command:
      [
        "-path=/migrations",
        "-database=postgres://user:password@db:5432/librigo?sslmode=disable",
        "up"
      ]
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: